# Database Configuration - Uses environment variables for production
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/lost_and_found_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:beauty}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Prevent SQL errors on deployment
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Server Configuration - Railway assigns dynamic port
server.port=${PORT:8081}

# Connection pool settings for better performance
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000